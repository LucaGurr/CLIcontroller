services:
  gpio-sim:
    build: ./gpio-sim
    volumes:
      - gpio_data:/gpio
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "test -f /gpio/gpio17/value"]
      interval: 500ms
      timeout: 5s
      retries: 10

  control:
    build: .
    stdin_open: true
    tty: true
    volumes:
      - gpio_data:/gpio
    depends_on:
      gpio-sim:
        condition: service_healthy

volumes:
  gpio_data:
